<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCommit v2.5</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css?cc_v=5.0.0" />
    <script src="https://cdn.tailwindcss.com?cc_v=2.5.6"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js?cc_v=5.0.0"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js?cc_v=5.0.0"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js?cc_v=5.0.0"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js?cc_v=5.0.0"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js?cc_v=5.0.0"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js?cc_v=5.0.0"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      .deep-space {
        background-color: #020617;
        background-image:
          radial-gradient(circle at 20% 15%, rgba(16, 185, 129, 0.08), transparent 35%),
          radial-gradient(circle at 80% 5%, rgba(56, 189, 248, 0.06), transparent 30%);
      }

      .cyber-card {
        border: 1px solid rgba(16, 185, 129, 0.45);
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        transition: box-shadow 180ms ease, border-color 180ms ease, transform 180ms ease;
      }

      .cyber-card:hover {
        border-color: rgba(16, 185, 129, 0.8);
        box-shadow: 0 0 18px rgba(16, 185, 129, 0.45);
        transform: translateY(-2px);
      }

      .console-btn {
        background: #020617;
        border: 1px solid rgba(16, 185, 129, 0.85);
        color: #34d399;
        transition: all 140ms ease;
      }

      .console-btn:hover {
        box-shadow: 0 0 14px rgba(16, 185, 129, 0.45);
      }

      .console-btn:active {
        color: #ffffff;
        box-shadow: inset 0 0 8px rgba(16, 185, 129, 0.5);
      }

      .exec-pr-premium {
        border-color: rgba(34, 211, 238, 0.85) !important;
        color: #67e8f9 !important;
        box-shadow: 0 0 14px rgba(34, 211, 238, 0.35);
        animation: premiumPulse 2.4s ease-in-out infinite;
      }

      .exec-pr-glow {
        filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.7));
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
      }

      .diamond-badge {
        display: inline-block;
        margin-left: 0.25rem;
        text-shadow: 0 0 8px rgba(34, 211, 238, 0.9);
        animation: diamondPulse 2.1s ease-in-out infinite;
      }

      .match-radar {
        animation: radarPulse 1.6s ease-in-out infinite;
      }

      .hall-card {
        border: 1px solid rgba(147, 51, 234, 0.35);
        animation: hallGlow 2.2s linear infinite;
      }

      /* Skeleton Loader Styles */
      .skeleton {
        background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
        border-radius: 4px;
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .skeleton-text { height: 1rem; margin-bottom: 0.5rem; }
      .skeleton-title { height: 1.5rem; width: 60%; margin-bottom: 0.5rem; }
      .skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; }
      .skeleton-card { height: 120px; }
      .skeleton-btn { height: 32px; width: 100px; }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 2rem;
        color: #64748b;
      }

      .empty-state-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.5;
      }

      /* Contribution Graph */
      .contribution-grid {
        display: grid;
        grid-template-columns: repeat(52, 1fr);
        gap: 2px;
      }

      .contribution-day {
        width: 8px;
        height: 8px;
        border-radius: 1px;
        background: #1e293b;
      }

      .contribution-day.level-1 { background: #064e3b; }
      .contribution-day.level-2 { background: #065f46; }
      .contribution-day.level-3 { background: #059669; }
      .contribution-day.level-4 { background: #10b981; }

      /* Achievement Badges */
      .achievement-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.625rem;
        font-weight: 600;
      }

      .badge-first-pr { background: #fef3c7; color: #92400e; }
      .badge-mentor { background: #dbeafe; color: #1e40af; }
      .badge-contributor { background: #d1fae5; color: #065f46; }
      .badge-early-adopter { background: #f3e8ff; color: #6b21a8; }
      .badge-top-karma { background: #fef9c3; color: #854d0e; }

      /* Streak flame animation */
      .streak-flame {
        display: inline-block;
        animation: flame 0.5s ease-in-out infinite alternate;
      }

      @keyframes flame {
        0% { transform: scale(1); }
        100% { transform: scale(1.1); }
      }

      /* Mobile responsive */
      @media (max-width: 768px) {
        .cyber-card:hover { transform: none; }
        .contribution-grid { grid-template-columns: repeat(26, 1fr); }
      }

      @keyframes hallGlow {
        0% { box-shadow: 0 0 10px rgba(236, 72, 153, 0.35); }
        33% { box-shadow: 0 0 12px rgba(34, 211, 238, 0.35); }
        66% { box-shadow: 0 0 12px rgba(16, 185, 129, 0.35); }
        100% { box-shadow: 0 0 10px rgba(236, 72, 153, 0.35); }
      }

      @keyframes radarPulse {
        0%, 100% { box-shadow: 0 0 10px rgba(16, 185, 129, 0.25); }
        50% { box-shadow: 0 0 22px rgba(16, 185, 129, 0.55); }
      }

      @keyframes premiumPulse {
        0%, 100% {
          box-shadow: 0 0 10px rgba(34, 211, 238, 0.28);
          transform: translateY(0);
        }
        50% {
          box-shadow: 0 0 20px rgba(34, 211, 238, 0.65);
          transform: translateY(-1px);
}
      }

      async function loadSnippets() {
        showSkeleton(snippetsList, 5);
        const data = await api("/v2/snippets?limit=50", { method: "GET" });
        snippetsList.innerHTML = "";
        if ((data.snippets || []).length === 0) {
          showEmptyState(snippetsList, '💻', 'No hay snippets todavía', 'Comparte fragmentos de código útiles', 'Agregar Snippet', () => switchTab('snippets'));
          return;
        }
        (data.snippets || []).forEach((s) => {
          const row = document.createElement("article");
          row.className = "rounded border border-violet-700/40 bg-slate-900/50 p-3 font-mono text-xs";
          row.innerHTML = `
            <div class="text-xs text-violet-400 mb-2">${s.language} • by ${decorateUsername(s.user_id, s.username)}</div>
            <div class="mb-2 text-sm text-cyan-300 font-semibold">${escapeHtml(s.title)}</div>
            <pre class="overflow-x-auto bg-slate-950 p-2 rounded text-emerald-300 whitespace-pre-wrap">${escapeHtml(s.code)}</pre>
            <div class="mt-2 flex items-center justify-between">
              <div class="text-xs text-violet-300">★ ${s.likes_count || 0} likes</div>
              <button data-copy="${s.id}" class="console-btn rounded px-2 py-1 text-xs">[ COPIAR ]</button>
            </div>
          `;
          const copyBtn = row.querySelector("button[data-copy]");
          if (copyBtn) {
            copyBtn.addEventListener("click", () => {
              navigator.clipboard.writeText(s.code);
              showToast("Código copiado al portapapeles");
            });
          }
          snippetsList.appendChild(row);
        });
      }

      async function loadResources() {
        showSkeleton(resourcesList, 5);
        const data = await api("/v2/resources?limit=50", { method: "GET" });
        resourcesList.innerHTML = "";
        if ((data.resources || []).length === 0) {
          showEmptyState(resourcesList, '📚', 'No hay recursos todavía', 'Comparte enlaces útiles para la comunidad', 'Agregar Recurso', () => switchTab('resources'));
          return;
        }
        (data.resources || []).forEach((r) => {
          const row = document.createElement("article");
          row.className = "rounded border border-emerald-700/40 bg-slate-900/50 p-3";
          row.innerHTML = `
            <div class="text-xs text-emerald-400">${r.topic} • by ${decorateUsername(r.user_id, r.username)}</div>
            <a class="text-sm text-cyan-300 underline break-all" href="${r.link}" target="_blank" rel="noreferrer">${r.link}</a>
            <div class="mt-1 flex items-center justify-between">
              <div class="text-xs text-emerald-300">⚡ Helpful: ${r.helpful_count}</div>
              ${me && r.user_id !== me.id ? `<button data-resource="${r.id}" class="console-btn rounded px-2 py-1 text-xs">[ HELPFUL ]</button>` : ""}
            </div>
          `;
          const helpfulBtn = row.querySelector("button[data-resource]");
          if (helpfulBtn) {
            helpfulBtn.addEventListener("click", async () => {
              try {
                const res = await api(`/v2/resources/${r.id}/helpful`, { method: "POST" });
                showToast(`Helpful registrado. Karma autor: ${res.author_karma_score}`);
                await loadResources();
                await loadTopContributors();
                await loadGlobalStats();
              } catch (err) {
                showToast(`Error helpful: ${err.message}`, "error");
              }
            });
          }
          resourcesList.appendChild(row);
        });
      }

      function markPrButtonAsSent(buttonEl) {
        buttonEl.disabled = true;
        buttonEl.textContent = "[ MERGE_COMPLETE ]";
        buttonEl.classList.remove("bg-red-600");
        buttonEl.classList.add("bg-emerald-900/40", "border", "border-emerald-500", "text-emerald-300", "cursor-not-allowed", "opacity-90");
      }

      async function runAccessScan() {
        scanOverlay.classList.add("active");
        scanLineA.textContent = "> Resolviendo IP local... 127.0.0.1";
        await new Promise((r) => setTimeout(r, 280));
        scanLineB.textContent = `> Enumerando specs... ${navigator.platform || "unknown"} / cores:${navigator.hardwareConcurrency || "?"}`;
        await new Promise((r) => setTimeout(r, 320));
        scanLineC.textContent = "> Handshake con núcleo CodeCommit... AUTH_OK";
        await new Promise((r) => setTimeout(r, 260));
        scanOverlay.classList.remove("active");
      }

      function registerActiveMatch(profileId, matchId) {
        activeMatchIds.add(profileId);
        profilesCache = profilesCache.map((p) =>
          p.id === profileId ? { ...p, match_id: matchId } : p
        );
        renderProfiles(profilesCache);
      }

      function openChatInstant(profileId, username) {
        currentChatId = null;
        chatLog.innerHTML = "";
        chatModal.classList.remove("hidden");
        chatModal.classList.add("flex");
        appendMsg("Sistema", `Conectando match rápido con ${username || "stress_dev"}...`);
        setTimeout(() => {
          if (!currentChatId) {
            appendMsg("Sistema", "Esperando confirmación del servidor...");
          }
        }, 320);
      }

      async function sendPR(toUserId, targetUsername, buttonEl) {
        buttonEl.disabled = true;
        buttonEl.textContent = "Enviando...";
        buttonEl.classList.remove("bg-red-600");
        buttonEl.classList.add("border-emerald-400", "text-emerald-300");
        console.log("[PR] target_id:", toUserId, "target_username:", targetUsername);
        const isStressTarget = String(targetUsername || "").startsWith("stress_");
        if (isStressTarget) {
          openChatInstant(toUserId, targetUsername);
        }
        try {
          const pr = await api("/v2/pull-requests", {
            method: "POST",
            body: JSON.stringify({ to_user_id: toUserId, target_id: toUserId }),
          });
          console.log("Respuesta API:", pr);
          markPrButtonAsSent(buttonEl);
          showToast("¡Pull Request enviado! Esperando Merge del otro dev");

          if (pr.matched) {
            if (pr.chat_id) {
              registerActiveMatch(toUserId, pr.chat_id);
            }
            setStatus("Match detectado. Abriendo chat realtime...");
            openChat(pr.chat_id);
            return;
          }

          setStatus("Pull Request enviado. Esperando merge...");
        } catch (err) {
          console.error("[PR] error:", err);
          buttonEl.disabled = false;
          buttonEl.textContent = `[ EXEC_PR --target_id=${toUserId} ]`;
          buttonEl.classList.remove("bg-emerald-900/40", "opacity-90", "cursor-not-allowed");
          buttonEl.classList.add("bg-red-600", "text-white", "border-red-400");
          setStatus(`Error enviando PR: ${err.message}`);
          showToast(`Error enviando PR: ${err.message}`, "error");
        }
      }

      async function loadIncomingPRs() {
        const data = await api("/v2/pull-requests/incoming", { method: "GET" });
        if (!data.pull_requests.length) {
          setStatus("No tienes PRs entrantes.");
          return;
        }
        const first = data.pull_requests[0];
        const merged = await api(`/v2/pull-requests/${first.id}/merge`, { method: "POST" });
        setStatus("PR mergeado. Chat habilitado.");
        const matchId = merged.match_id || merged.chat_id;
        if (matchId) {
          registerActiveMatch(first.from_user_id, matchId);
          openChat(matchId);
        }
      }

      async function openChat(chatId) {
        currentChatId = chatId;
        chatLog.innerHTML = "";
        chatModal.classList.remove("hidden");
        chatModal.classList.add("flex");
        scratchpadPanel.classList.add("hidden");
        scratchpadArea.value = "";

        const history = await api(`/v2/chat/${chatId}/messages`, { method: "GET" });
        (history.messages || []).forEach((m) => appendMsg(m.sender_id === me.id ? "Tú" : `Dev ${m.sender_id}`, m.body));
        try {
          const scratch = await api(`/v2/chat/${chatId}/scratchpad`, { method: "GET" });
          scratchpadArea.value = String(scratch.content || "");
        } catch {
          scratchpadArea.value = "";
        }

        if (chatSocket) chatSocket.close();
        chatSocket = new WebSocket(resolveWsUrl(chatId));
        chatSocket.onmessage = (evt) => {
          const data = JSON.parse(evt.data);
          if (data.type === "chat.message") {
            const m = data.message;
            appendMsg(m.sender_id === me.id ? "Tú" : `Dev ${m.sender_id}`, m.body);
            if (m.sender_id !== me.id) {
              desktopNotify("CodeCommit Chat", `Nuevo mensaje en chat ${chatId}`);
            }
          } else if (data.type === "chat.scratchpad" && data.scratchpad) {
            applyingRemoteScratch = true;
            scratchpadArea.value = String(data.scratchpad.content || "");
            applyingRemoteScratch = false;
            showNotification("[ INCOMING_DATA: NEW_COMMENT_STREAM ]", "warning");
          }
        };
      }

      function renderMarkdown(text) {
        const source = String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
        if (window.marked && typeof window.marked.parse === "function") {
          return window.marked.parse(source);
        }
        return source;
      }

      function appendMsg(from, text) {
        const row = document.createElement("div");
        row.className = "mb-1";
        const isMe = from === "Tú";
        const fromClass = isMe ? "text-pink-500" : "text-emerald-300";
        const textClass = isMe ? "text-pink-500 drop-shadow-[0_0_5px_#f472b6]" : "text-emerald-200";
        row.innerHTML = `<span class="${fromClass}">${from}:</span> <span class="${textClass} chat-md">${renderMarkdown(text)}</span>`;
        if (window.Prism && typeof window.Prism.highlightAllUnder === "function") {
          window.Prism.highlightAllUnder(row);
        }
        chatLog.appendChild(row);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        const payload = { username: form.get("username"), password: form.get("password") };
        try {
          const data = await api("/v2/auth/login", { method: "POST", body: JSON.stringify(payload) });
          setToken(data.access_token);
          await initSession();
          setStatus("Login correcto.");
        } catch (err) {
          console.error("[LOGIN] error:", err);
          setStatus(`Error login: ${err.message}`);
        }
      });

      document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        const payload = {
          username: form.get("username"),
          password: form.get("password"),
          stack: String(form.get("stack")).split(",").map((s) => s.trim()).filter(Boolean),
          years_exp: Number(form.get("years_exp")),
          tabs_vs_spaces: form.get("tabs_vs_spaces") === "on",
          dark_mode: form.get("dark_mode") === "on",
          puzzle_answer: "1",
        };
        console.log("[REGISTER] payload:", payload);
        try {
          const result = await api("/v2/auth/register", { method: "POST", body: JSON.stringify(payload) });
          console.log("[REGISTER] response:", result);
          setStatus("Cuenta creada. Ahora haz login.");
        } catch (err) {
          console.error("[REGISTER] error:", err);
          setStatus(`Error registro: ${err.message}`);
        }
      });

        try {

        } catch (err) {

        }
      });
      tabMarketplaceBtn.addEventListener("click", async () => {
        switchTab("marketplace");
        await loadMarketplace();
      });
      tabResourcesBtn.addEventListener("click", async () => {
        switchTab("resources");
        await loadResources();
      });
      hallBtn.addEventListener("click", async () => {
        await loadTopContributors();
        hallModal.classList.remove("hidden");
        hallModal.classList.add("flex");
      });
      closeHallBtn.addEventListener("click", () => {
        hallModal.classList.add("hidden");
        hallModal.classList.remove("flex");
      });
      document.getElementById("closeChatBtn").addEventListener("click", () => {
        chatModal.classList.add("hidden");
        chatModal.classList.remove("flex");
      });
      document.getElementById("chatForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const body = chatInput.value.trim();
        if (!body) return;
        chatInput.value = "";
        if (!currentChatId) return;
        await api(`/v2/chat/${currentChatId}/messages`, {
          method: "POST",
          body: JSON.stringify({ body }),
        });
      });
      openScratchpadBtn.addEventListener("click", () => {
        scratchpadPanel.classList.toggle("hidden");
      });
      scratchpadArea.addEventListener("input", () => {
        if (!currentChatId || applyingRemoteScratch) return;
        if (scratchpadSyncTimer) clearTimeout(scratchpadSyncTimer);
        scratchpadSyncTimer = setTimeout(async () => {
          const content = scratchpadArea.value;
          try {
            if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
              chatSocket.send(JSON.stringify({ type: "scratchpad.update", content }));
            } else {
              await api(`/v2/chat/${currentChatId}/scratchpad`, {
                method: "POST",
                body: JSON.stringify({ content }),
              });
            }
          } catch (err) {
            showNotification(`SYNC_ERROR: ${err.message}`, "error");
          }
        }, 120);
      });
      exportGistBtn.addEventListener("click", async () => {
        if (!currentChatId) return;
        try {
          const gist = await api("/v2/export/gist", {
            method: "POST",
            body: JSON.stringify({
              chat_id: currentChatId,
              content: scratchpadArea.value,
              filename: `scratchpad-chat-${currentChatId}.py`,
              language: "python",
            }),
          });
          showNotification(`[ EXPORT_COMPLETE ] ${gist.gist_url}`, "success");
          desktopNotify("CodeCommit Export", "Scratchpad exportado a Gist simulado");
        } catch (err) {
          showNotification(`EXPORT_ERROR: ${err.message}`, "error");
        }
      });
      logoutBtn.addEventListener("click", () => {
        if (realtimePulseId) clearInterval(realtimePulseId);
        localStorage.removeItem(tokenKey);

      });

      clusterCreateForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = new FormData(e.target);
        try {
          await api("/v2/clusters", {
            method: "POST",
            body: JSON.stringify({
              name: form.get("name"),
              description: form.get("description"),
              min_karma_required: Number(form.get("min_karma_required") || 0),
              tech_stack_focus: form.get("tech_stack_focus"),
            }),
          });
          showToast("Cluster creado.");
          e.target.reset();
          await loadClusters(clusterSearchEl.value.trim());
        } catch (err) {
          showToast(`Error creando cluster: ${err.message}`, "error");
        }
      });

      clusterSearchBtn.addEventListener("click", async () => {
        await loadClusters(clusterSearchEl.value.trim());
      });

      startMatrixBackground();
      (async () => {
        await runBootSequence();
        await initSession();
      })();
    </script>
  </body>
</html>
