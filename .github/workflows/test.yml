name: CodeCommit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio fastapi pyjwt bcrypt httpx
          pip install -e ./src
          
      - name: Run tests
        env:
          CODECOMMIT_JWT_SECRET: test-secret-for-ci-only
        run: |
          pytest tests/test_core.py -v
