services:
  codecommit-api:
    build: .
    container_name: codecommit-api
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - CODECOMMIT_JWT_SECRET=${CODECOMMIT_JWT_SECRET}
      - CODECOMMIT_JWT_TTL=${CODECOMMIT_JWT_TTL:-86400}
      - CODECOMMIT_APP_VERSION=${CODECOMMIT_APP_VERSION:-5.7}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/codecommit.db}
      - CODECOMMIT_ADMIN_DASH_SECRET=${CODECOMMIT_ADMIN_DASH_SECRET}
      - CODECOMMIT_ADMIN_BOOTSTRAP_KEY=${CODECOMMIT_ADMIN_BOOTSTRAP_KEY}
      - CODECOMMIT_RATE_LIMIT_MAX=${CODECOMMIT_RATE_LIMIT_MAX:-60}
      - CODECOMMIT_RATE_LIMIT_WINDOW_SECONDS=${CODECOMMIT_RATE_LIMIT_WINDOW_SECONDS:-60}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
