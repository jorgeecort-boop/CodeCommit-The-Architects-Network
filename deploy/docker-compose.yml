version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/app/data/codecommit.db
      - MEDIA_DIR=/app/media
      - CODECOMMIT_JWT_SECRET=${JWT_SECRET}
      - CODECOMMIT_JWT_TTL=86400
      - CODECOMMIT_ADMIN_DASH_SECRET=${ADMIN_DASH_SECRET:-codecommit-admin}
      - CODECOMMIT_CORS_ORIGINS=http://localhost,http://localhost:8080,http://127.0.0.1:8080,https://74.208.227.87
      - CODECOMMIT_RATE_LIMIT_MAX=180
      - CODECOMMIT_RATE_LIMIT_WINDOW_SECONDS=60
      - CODECOMMIT_APP_VERSION=6.0
    volumes:
      - ./data:/app/data
      - ./media:/app/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v2/stats/global"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data:/app/data
      - ./media:/app/media
    depends_on:
      - app
    restart: unless-stopped
